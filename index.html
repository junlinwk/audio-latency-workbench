<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Listening Device Latency Check</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            color-scheme: dark;
            --bg: #050d1a;
            --bg-soft: #0a1628;
            --panel: rgba(17, 27, 43, 0.55);
            --panel-border: rgba(255, 255, 255, 0.12);
            --panel-highlight: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(0, 0, 0, 0.2);
            --text: #f0f6ff;
            --text-muted: #8ba0c2;
            --accent: #35d4ff;
            --accent-strong: #00aeff;
            --warn: #ff9e6b;
            --good: #5ce093;
            --bad: #ff5c5c;
            --ring-base: rgba(112, 140, 190, 0.2);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #e2ecfb;
            --bg-soft: #f0f5ff;
            --panel: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.6);
            --panel-highlight: rgba(255, 255, 255, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --text: #111d30;
            --text-muted: #546a8a;
            --accent: #0073e6;
            --accent-strong: #005bb5;
            --warn: #d96621;
            --good: #1a8c54;
            --bad: #c92a42;
            --ring-base: rgba(72, 105, 164, 0.15);
            --shadow: 0 30px 60px rgba(12, 36, 77, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Noto Sans TC", sans-serif;
            background: linear-gradient(150deg, var(--bg), var(--bg-soft));
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: clamp(16px, 4vw, 40px);
            overflow-x: hidden;
            transition: background 320ms ease, color 280ms ease;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.5;
            animation: drift 20s ease-in-out infinite alternate;
            z-index: -1;
        }

        .bg-orb.a {
            width: 50vw;
            height: 50vw;
            max-width: 600px;
            max-height: 600px;
            background: var(--accent);
            top: -10%;
            left: -10%;
            opacity: 0.15;
        }

        .bg-orb.b {
            width: 60vw;
            height: 60vw;
            max-width: 700px;
            max-height: 700px;
            background: var(--accent-strong);
            right: -15%;
            bottom: -15%;
            animation-delay: -5s;
            opacity: 0.12;
        }
        
        .bg-orb.c {
            width: 40vw;
            height: 40vw;
            max-width: 500px;
            max-height: 500px;
            background: var(--warn);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            opacity: 0.08;
        }

        @keyframes drift {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(30px, -30px, 0) scale(1.1); }
        }

        .app-shell {
            position: relative;
            width: min(1000px, 100%);
            border: 1px solid var(--panel-border);
            border-radius: 32px;
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow: var(--shadow), inset 0 1px 1px var(--panel-highlight);
            padding: clamp(24px, 4vw, 40px);
            animation: rise 800ms cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @keyframes rise {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .top-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: -20px;
            position: relative;
            z-index: 10;
        }

        .glass-switch {
            position: relative;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 4px;
            min-width: 120px;
            height: 44px;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid var(--panel-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .glass-switch::before {
            content: "";
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            transform: translateX(0);
            transition: transform 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 0;
        }

        .glass-switch[data-active="right"]::before {
            transform: translateX(calc(100% + 4px));
        }

        .segment-btn {
            position: relative;
            z-index: 1;
            border: none;
            background: transparent;
            color: var(--text-muted);
            height: 100%;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: color 200ms ease, text-shadow 200ms ease;
        }

        .segment-btn.active {
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        :root[data-theme="light"] .segment-btn.active {
            color: #fff;
        }

        .segment-btn .icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        .theme-pill {
            min-width: 104px;
        }

        .gear-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--panel-border);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            color: var(--text);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 250ms ease;
        }

        .gear-button:hover {
            transform: rotate(45deg);
            background: rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
            white-space: pre-line;
        }

        .guide {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            background: var(--glass-bg);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            align-self: center;
            margin-left: auto;
            margin-right: auto;
            max-width: 100%;
        }

        #guideTitle {
            font-weight: 700;
            color: var(--text);
            align-self: center;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(300px, 1.2fr) minmax(280px, 1fr);
            gap: clamp(20px, 3vw, 32px);
            align-items: stretch;
        }

        .canvas-card {
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            background: var(--glass-bg);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-wrap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
            touch-action: manipulation;
        }

        canvas {
            width: min(100%, 360px);
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.1) 60%, rgba(0, 0, 0, 0.3));
            border: 1px solid var(--panel-border);
            box-shadow: 
                inset 0 2px 10px rgba(255, 255, 255, 0.1),
                0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: crosshair;
            transition: transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        canvas:active {
            transform: scale(0.98);
        }

        .overlay-message {
            position: absolute;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(10, 24, 44, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid var(--panel-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 250ms ease, transform 250ms ease;
            pointer-events: none;
        }

        .overlay-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
        }

        .primary-btn, .secondary-btn {
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 120px;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            box-shadow: 0 4px 15px rgba(53, 212, 255, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        :root[data-theme="light"] .primary-btn {
            box-shadow: 0 4px 15px rgba(0, 115, 230, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .secondary-btn {
            background: var(--glass-bg);
            color: var(--text);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
        }

        .primary-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(53, 212, 255, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        :root[data-theme="light"] .primary-btn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(0, 115, 230, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        .secondary-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .primary-btn:disabled, .secondary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hint {
            margin-top: 16px;
            min-height: 24px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            transition: color 200ms ease;
        }

        .hint.good { color: var(--good); }
        .hint.bad { color: var(--bad); }
        .hint.neutral { color: var(--warn); }

        .result-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hero-number {
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--glass-bg);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            padding: 24px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-number::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .hero-number .label {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hero-number .value {
            margin-top: 8px;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(53, 212, 255, 0.2);
        }

        :root[data-theme="light"] .hero-number .value {
            text-shadow: 0 2px 10px rgba(0, 115, 230, 0.2);
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .metric {
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 16px;
            background: var(--glass-bg);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
            transition: transform 200ms ease, background 200ms ease;
        }
        
        .metric:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .metric .name {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .metric .num {
            margin-top: 8px;
            font-size: clamp(1.2rem, 2.5vw, 1.4rem);
            font-weight: 700;
            color: var(--text);
        }

        .status {
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 16px 20px;
            background: var(--glass-bg);
            box-shadow: inset 0 1px 1px var(--panel-highlight);
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
        }

        .shortcut {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            margin-top: auto;
            padding-top: 8px;
        }

        .settings-panel {
            position: absolute;
            top: 70px;
            right: clamp(16px, 3vw, 28px);
            width: min(340px, calc(100% - 32px));
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow), inset 0 1px 1px var(--panel-highlight);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.98);
            transform-origin: top right;
            transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
        }

        .settings-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .settings-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text);
        }

        .settings-field {
            display: grid;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .settings-select {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 10px 14px;
            font: inherit;
            color: var(--text);
            background: var(--glass-bg);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: border-color 200ms ease;
        }
        
        .settings-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .check-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text);
            cursor: pointer;
            padding: 4px 0;
        }

        .check-row input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 860px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }

            .app-shell {
                padding: 16px 12px; /* Reduce horizontal padding */
                border-radius: 20px;
                width: 100%; /* Ensure full width */
            }

            .workspace {
                grid-template-columns: 1fr;
                gap: 20px;
                width: 100%;
            }

            .canvas-card {
                padding: 16px 8px; /* Reduce internal padding for canvas card */
                width: 100%;
                border-radius: 20px;
            }
            
            .canvas-wrap {
                width: 100%;
                padding: 10px 0;
            }
            
            canvas {
                /* Let JS handle specific pixel size, but ensure CSS doesn't force overflow */
                max-width: 100%;
                height: auto; 
            }

            .result-column {
                order: 1; /* Move results below canvas on mobile */
            }

            .metric-grid {
                grid-template-columns: 1fr 1fr;
            }

            .top-row {
                justify-content: space-between;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }

            .control-row {
                gap: 8px;
            }

            .primary-btn, .secondary-btn {
                padding: 12px 20px;
                font-size: 0.95rem;
                min-width: 100px;
            }
        }
    </style>
    </head>
    <body>
        <div class="bg-orb a"></div>
        <div class="bg-orb b"></div>
        <div class="bg-orb c"></div>

        <main class="app-shell">
            <div class="top-row">
                <div id="languageSwitch" class="glass-switch"
                    data-active="right" role="group"
                    aria-label="Language switch">
                    <button id="langEnBtn" class="segment-btn"
                        type="button">EN</button>
                    <button id="langZhBtn" class="segment-btn active"
                        type="button">中</button>
                </div>
                <div id="themeSwitch" class="glass-switch theme-pill"
                    data-active="right" role="group" aria-label="Theme switch">
                    <button id="themeLightBtn" class="segment-btn"
                        type="button"><span class="icon">☀</span></button>
                    <button id="themeDarkBtn" class="segment-btn active"
                        type="button"><span class="icon">☾</span></button>
                </div>
                <button id="settingsBtn" class="gear-button" type="button"
                    aria-label="Settings" aria-expanded="false">&#9881;</button>
            </div>

            <section class="header">
                <h1 id="titleText"></h1>
                <p id="subtitleText" class="subtitle"></p>
                <div class="guide">
                    <div id="guideTitle"></div>
                    <div id="guideStep1"></div>
                    <div id="guideStep2"></div>
                    <div id="guideStep3"></div>
                </div>
            </section>

            <section class="workspace">
                <div class="canvas-card">
                    <div class="canvas-wrap">
                        <canvas id="gameCanvas" width="500"
                            height="500"></canvas>
                        <div id="overlayMessage" class="overlay-message"></div>
                    </div>
                    <div class="control-row">
                        <button id="startBtn" class="primary-btn"
                            type="button"></button>
                        <button id="stopBtn" class="secondary-btn"
                            type="button"></button>
                    </div>
                    <div id="hintText" class="hint neutral"></div>
                </div>

                <aside class="result-column">
                    <div class="hero-number">
                        <div id="resultLabel" class="label"></div>
                        <div id="resultValue" class="value">-- ms</div>
                    </div>

                    <div class="metric-grid">
                        <div class="metric">
                            <div id="metricAvgLabel" class="name"></div>
                            <div id="metricAvgValue" class="num">-- ms</div>
                        </div>
                        <div class="metric">
                            <div id="metricStdLabel" class="name"></div>
                            <div id="metricStdValue" class="num">-- ms</div>
                        </div>
                        <div class="metric">
                            <div id="metricSampleLabel" class="name"></div>
                            <div id="metricSampleValue" class="num">0</div>
                        </div>
                        <div class="metric">
                            <div id="metricLastLabel" class="name"></div>
                            <div id="metricLastValue" class="num">-- ms</div>
                        </div>
                    </div>

                    <div id="statusText" class="status"></div>
                    <div id="shortcutText" class="shortcut"></div>
                </aside>
            </section>

            <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
                <div id="settingsTitle" class="settings-title"></div>

                <label class="settings-field" for="languageSelect">
                    <span id="languageLabel"></span>
                    <select id="languageSelect" class="settings-select">
                        <option value="zh-TW">繁體中文</option>
                        <option value="en">English</option>
                    </select>
                </label>

                <label class="settings-field" for="themeSelect">
                    <span id="themeLabel"></span>
                    <select id="themeSelect" class="settings-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </label>

                <label class="check-row" for="showInitialToggle">
                    <input id="showInitialToggle" type="checkbox">
                    <span id="showInitialLabel"></span>
                </label>

                <label class="check-row" for="showClickBarToggle">
                    <input id="showClickBarToggle" type="checkbox">
                    <span id="showClickBarLabel"></span>
                </label>
            </aside>
        </main>

        <script>
        const i18n = {
            "zh-TW": {
                title: "音訊裝置延遲測試",
                subtitle: "用固定節拍與點擊時間差，估算裝置音訊輸出延遲\n建議在安靜環境下進行",
                guideTitle: "測試流程",
                guide1: "1. 按「開始測試」或鍵盤 Enter 開始",
                guide2: "2. 聽到每拍聲音時，點擊圓環（手機可直接觸控）",
                guide3: "3. 按 Esc 或「停止測試」即可結束",
                start: "開始測試",
                stop: "停止測試",
                resultLabel: "目前估計延遲",
                avgLabel: "平均延遲",
                stdLabel: "穩定度 (標準差)",
                sampleLabel: "樣本數",
                lastLabel: "最近一次",
                settings: "設定",
                language: "語言",
                theme: "主題",
                dark: "暗色",
                light: "亮色",
                showInitial: "顯示每次初始點（音頻實際播放位置）",
                showClickBar: "顯示點擊白色槓",
                shortcut: "快捷鍵：Enter 開始，Esc 停止，Space 輸入",
                statusIdle: "狀態：尚未開始",
                statusRunning: "狀態：測試進行中",
                statusStopped: "狀態：測試已停止",
                statusBpm: "節拍：60 BPM",
                hintReady: "按下開始後，跟著每拍聲音點擊。",
                hintWarmup: "節拍啟動中，請先聽 1-2 拍再開始輸入。",
                hintNeedMore: "再收集幾次點擊，結果會更穩定。",
                hintStable: "穩定度良好，已可作為延遲估計。",
                hintUnstable: "誤差偏大，請更專注於聲音節點。",
                hintStopped: "測試已停止，可重新開始下一輪。",
                hintAudioDenied: "音訊初始化失敗，請允許瀏覽器播放音訊。",
                countdown: "準備開始：{sec} 秒",
                switchToEn: "EN",
                switchToZh: "中",
                switchToLight: "亮色",
                switchToDark: "暗色"
            },
            en: {
                title: "Listening Device Latency Workbench",
                subtitle: "Estimate output latency by comparing your tap timing to a fixed beat in real time.",
                guideTitle: "Flow",
                guide1: "1. Press Start or hit Enter to begin.",
                guide2: "2. Tap the ring exactly on each beep (touch supported on mobile).",
                guide3: "3. Press Esc or Stop to end the session.",
                start: "Start Test",
                stop: "Stop Test",
                resultLabel: "Estimated Latency",
                avgLabel: "Average",
                stdLabel: "Stability (Std Dev)",
                sampleLabel: "Samples",
                lastLabel: "Last Tap",
                settings: "Settings",
                language: "Language",
                theme: "Theme",
                dark: "Dark",
                light: "Light",
                showInitial: "Show initial point (actual audio beat location)",
                showClickBar: "Show white click bar",
                shortcut: "Shortcuts: Enter start, Esc stop, Space input",
                statusIdle: "Status: Idle",
                statusRunning: "Status: Running",
                statusStopped: "Status: Stopped",
                statusBpm: "Tempo: 60 BPM",
                hintReady: "Press Start, then sync your tap with each beep.",
                hintWarmup: "Beat is live. Listen to 1-2 beats, then tap.",
                hintNeedMore: "Collect a few more taps for stable statistics.",
                hintStable: "Good consistency. This estimate is now usable.",
                hintUnstable: "Large variance detected. Focus on the beat onset.",
                hintStopped: "Test stopped. Start again for a new run.",
                hintAudioDenied: "Audio initialization failed. Please allow playback.",
                countdown: "Starting in: {sec}s",
                switchToEn: "EN",
                switchToZh: "中",
                switchToLight: "Light",
                switchToDark: "Dark"
            }
        };

        const state = {
            language: "zh-TW",
            theme: "dark",
            showInitialPoint: true,
            showClickBar: true,
            running: false,
            starting: false,
            status: "idle",
            hintKey: "hintReady",
            bpm: 60,
            beatLen: 1,
            beatAngle: 0,
            anchorTime: 0,
            nextScheduledBeatTime: 0,
            history: [],
            marks: [],
            lastDelta: null,
            lastTapAudioTime: 0,
            canvasSize: 500,
            audioCtx: null,
            colors: {
                ringBase: "rgba(112, 140, 190, 0.2)"
            }
        };

        const el = {
            canvas: document.getElementById("gameCanvas"),
            startBtn: document.getElementById("startBtn"),
            stopBtn: document.getElementById("stopBtn"),
            hint: document.getElementById("hintText"),
            overlay: document.getElementById("overlayMessage"),
            resultValue: document.getElementById("resultValue"),
            metricAvgValue: document.getElementById("metricAvgValue"),
            metricStdValue: document.getElementById("metricStdValue"),
            metricSampleValue: document.getElementById("metricSampleValue"),
            metricLastValue: document.getElementById("metricLastValue"),
            statusText: document.getElementById("statusText"),
            shortcutText: document.getElementById("shortcutText"),
            titleText: document.getElementById("titleText"),
            subtitleText: document.getElementById("subtitleText"),
            guideTitle: document.getElementById("guideTitle"),
            guideStep1: document.getElementById("guideStep1"),
            guideStep2: document.getElementById("guideStep2"),
            guideStep3: document.getElementById("guideStep3"),
            resultLabel: document.getElementById("resultLabel"),
            metricAvgLabel: document.getElementById("metricAvgLabel"),
            metricStdLabel: document.getElementById("metricStdLabel"),
            metricSampleLabel: document.getElementById("metricSampleLabel"),
            metricLastLabel: document.getElementById("metricLastLabel"),
            settingsBtn: document.getElementById("settingsBtn"),
            settingsPanel: document.getElementById("settingsPanel"),
            settingsTitle: document.getElementById("settingsTitle"),
            languageSwitch: document.getElementById("languageSwitch"),
            themeSwitch: document.getElementById("themeSwitch"),
            langEnBtn: document.getElementById("langEnBtn"),
            langZhBtn: document.getElementById("langZhBtn"),
            themeLightBtn: document.getElementById("themeLightBtn"),
            themeDarkBtn: document.getElementById("themeDarkBtn"),
            languageLabel: document.getElementById("languageLabel"),
            themeLabel: document.getElementById("themeLabel"),
            languageSelect: document.getElementById("languageSelect"),
            themeSelect: document.getElementById("themeSelect"),
            showInitialToggle: document.getElementById("showInitialToggle"),
            showClickBarToggle: document.getElementById("showClickBarToggle"),
            showInitialLabel: document.getElementById("showInitialLabel"),
            showClickBarLabel: document.getElementById("showClickBarLabel")
        };

        const ctx = el.canvas.getContext("2d");

        function t(key, vars = {}) {
            const pack = i18n[state.language] || i18n.en;
            const text = pack[key] || key;
            return text.replace(/\{(\w+)\}/g, (_, k) => (vars[k] !== undefined ? vars[k] : `{${k}}`));
        }

        function clamp(v, min, max) {
            return Math.min(max, Math.max(min, v));
        }

        function posMod(value, mod) {
            return ((value % mod) + mod) % mod;
        }

        function formatMs(ms, digits = 1, alwaysSign = false) {
            if (ms === null || Number.isNaN(ms)) return "-- ms";
            const sign = alwaysSign && ms > 0 ? "+" : "";
            return `${sign}${ms.toFixed(digits)} ms`;
        }

        function savePrefs() {
            try {
                localStorage.setItem("latency-workbench-prefs", JSON.stringify({
                    language: state.language,
                    theme: state.theme,
                    showInitialPoint: state.showInitialPoint,
                    showClickBar: state.showClickBar
                }));
            } catch (_) {
                // Ignore storage failures.
            }
        }

        function loadPrefs() {
            try {
                const raw = localStorage.getItem("latency-workbench-prefs");
                if (!raw) return;
                const prefs = JSON.parse(raw);
                if (prefs.language && i18n[prefs.language]) state.language = prefs.language;
                if (prefs.theme === "dark" || prefs.theme === "light") state.theme = prefs.theme;
                if (typeof prefs.showInitialPoint === "boolean") state.showInitialPoint = prefs.showInitialPoint;
                if (typeof prefs.showClickBar === "boolean") state.showClickBar = prefs.showClickBar;
            } catch (_) {
                // Ignore storage failures.
            }
        }

        function updateThemeColors() {
            const style = getComputedStyle(document.documentElement);
            state.colors.ringBase = style.getPropertyValue("--ring-base").trim();
        }

        function applyTheme(theme) {
            state.theme = theme;
            document.documentElement.setAttribute("data-theme", theme);
            el.themeSelect.value = theme;
            syncTopSwitches();
            updateThemeColors();
            savePrefs();
        }

        function setLanguage(lang) {
            state.language = i18n[lang] ? lang : "en";
            document.documentElement.lang = state.language === "zh-TW" ? "zh-TW" : "en";
            el.languageSelect.value = state.language;
            applyText();
            syncTopSwitches();
            savePrefs();
        }

        function syncTopSwitches() {
            const isZh = state.language === "zh-TW";
            el.languageSwitch.dataset.active = isZh ? "right" : "left";
            el.langEnBtn.classList.toggle("active", !isZh);
            el.langZhBtn.classList.toggle("active", isZh);

            const isDark = state.theme === "dark";
            el.themeSwitch.dataset.active = isDark ? "right" : "left";
            el.themeLightBtn.classList.toggle("active", !isDark);
            el.themeDarkBtn.classList.toggle("active", isDark);
        }

        function setHint(key, level = "neutral") {
            state.hintKey = key;
            el.hint.textContent = t(key);
            el.hint.className = `hint ${level}`;
        }

        function setStatus(status) {
            state.status = status;
            let statusLine = t("statusIdle");
            if (status === "running") statusLine = t("statusRunning");
            if (status === "stopped") statusLine = t("statusStopped");
            el.statusText.innerHTML = `${statusLine}<br>${t("statusBpm")}`;
        }

        function applyText() {
            el.titleText.textContent = t("title");
            el.subtitleText.textContent = t("subtitle");
            el.guideTitle.textContent = t("guideTitle");
            el.guideStep1.textContent = t("guide1");
            el.guideStep2.textContent = t("guide2");
            el.guideStep3.textContent = t("guide3");
            el.startBtn.textContent = t("start");
            el.stopBtn.textContent = t("stop");
            el.resultLabel.textContent = t("resultLabel");
            el.metricAvgLabel.textContent = t("avgLabel");
            el.metricStdLabel.textContent = t("stdLabel");
            el.metricSampleLabel.textContent = t("sampleLabel");
            el.metricLastLabel.textContent = t("lastLabel");
            el.settingsTitle.textContent = t("settings");
            el.languageLabel.textContent = t("language");
            el.themeLabel.textContent = t("theme");
            el.showInitialLabel.textContent = t("showInitial");
            el.showClickBarLabel.textContent = t("showClickBar");
            el.shortcutText.textContent = t("shortcut");
            setStatus(state.status);
            setHint(state.hintKey, el.hint.classList.contains("good") ? "good" : (el.hint.classList.contains("bad") ? "bad" : "neutral"));
        }

        function updateStats() {
            const n = state.history.length;
            if (n === 0) {
                el.resultValue.textContent = "-- ms";
                el.metricAvgValue.textContent = "-- ms";
                el.metricStdValue.textContent = "-- ms";
                el.metricSampleValue.textContent = "0";
                el.metricLastValue.textContent = "-- ms";
                return;
            }

            const avg = state.history.reduce((sum, v) => sum + v, 0) / n;
            const variance = state.history.reduce((sum, v) => {
                const delta = v - avg;
                return sum + delta * delta;
            }, 0) / n;
            const stdDev = Math.sqrt(variance);

            el.resultValue.textContent = formatMs(avg, 1);
            el.metricAvgValue.textContent = formatMs(avg, 1);
            el.metricStdValue.textContent = formatMs(stdDev, 1);
            el.metricSampleValue.textContent = String(n);
            el.metricLastValue.textContent = formatMs(state.lastDelta, 1, true);

            if (n < 4) {
                setHint("hintNeedMore", "neutral");
            } else if (stdDev > 45) {
                setHint("hintUnstable", "bad");
            } else {
                setHint("hintStable", "good");
            }
        }

        async function ensureAudio() {
            try {
                if (!state.audioCtx) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    state.audioCtx = new AudioContextClass();
                }
                if (state.audioCtx.state === "suspended") {
                    await state.audioCtx.resume();
                }
                return true;
            } catch (_) {
                setHint("hintAudioDenied", "bad");
                return false;
            }
        }

        function playTick(time) {
            if (!state.audioCtx) return;
            const osc = state.audioCtx.createOscillator();
            const gain = state.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(state.audioCtx.destination);
            osc.type = "triangle";
            osc.frequency.setValueAtTime(1260, time);
            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(0.25, time + 0.004);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.07);
            osc.start(time);
            osc.stop(time + 0.08);
        }

        function scheduleTicks(now) {
            if (!state.running || !state.audioCtx) return;

            const scheduleAheadTime = 0.12;
            if (now - state.nextScheduledBeatTime > state.beatLen * 24) {
                const jumpBeats = Math.floor((now - state.nextScheduledBeatTime) / state.beatLen) - 4;
                state.nextScheduledBeatTime += jumpBeats * state.beatLen;
            }

            let guard = 0;
            while (state.nextScheduledBeatTime < now + scheduleAheadTime) {
                playTick(state.nextScheduledBeatTime);
                state.nextScheduledBeatTime += state.beatLen;
                guard += 1;
                if (guard > 24) break;
            }
        }

        function angleAtTime(time) {
            const phase = posMod(time - state.anchorTime, state.beatLen) / state.beatLen;
            return state.beatAngle + phase * Math.PI * 2;
        }

        function registerTap() {
            if (!state.running || !state.audioCtx) return;
            const now = state.audioCtx.currentTime;
            
            // 1. 忽略倒數計時期間的誤觸 (Ignore taps during countdown)
            if (now < state.anchorTime - 0.05) return;

            // 2. 增加防抖 (Debounce)：防止單次按鍵產生多次點擊 (Prevent double taps)
            // Minimum interval of 200ms between taps
            if (state.lastTapAudioTime > 0 && (now - state.lastTapAudioTime < 0.2)) return;
            state.lastTapAudioTime = now;

            const nearestBeatIndex = Math.round((now - state.anchorTime) / state.beatLen);
            const nearestBeatTime = state.anchorTime + nearestBeatIndex * state.beatLen;
            const deltaMs = (now - nearestBeatTime) * 1000;

            state.lastDelta = deltaMs;
            state.history.push(deltaMs);
            if (state.history.length > 600) state.history.shift();

            state.marks.push({
                angle: angleAtTime(now),
                opacity: 1
            });
            if (state.marks.length > 60) state.marks.shift();

            updateStats();
        }

        function syncButtons() {
            el.startBtn.disabled = state.running || state.starting;
            el.stopBtn.disabled = !state.running;
        }

        async function startTest() {
            if (state.running || state.starting) return;
            state.starting = true;
            syncButtons();

            const ready = await ensureAudio();
            state.starting = false;
            if (!ready) {
                syncButtons();
                return;
            }

            state.history = [];
            state.marks = [];
            state.lastDelta = null;
            state.beatAngle = Math.random() * Math.PI * 2;
            state.anchorTime = state.audioCtx.currentTime + 0.9;
            state.nextScheduledBeatTime = state.anchorTime;
            state.running = true;
            setStatus("running");
            setHint("hintWarmup", "neutral");
            updateStats();
            syncButtons();
        }

        function stopTest() {
            if (!state.running) return;
            state.running = false;
            setStatus("stopped");
            setHint("hintStopped", "neutral");
            el.overlay.classList.remove("show");
            syncButtons();
        }

        function toggleSettings(forceOpen) {
            const willOpen = forceOpen !== undefined ? forceOpen : !el.settingsPanel.classList.contains("open");
            el.settingsPanel.classList.toggle("open", willOpen);
            el.settingsPanel.setAttribute("aria-hidden", String(!willOpen));
            el.settingsBtn.setAttribute("aria-expanded", String(willOpen));
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            
            // Use window.innerWidth directly to avoid feedback loops if container is already stretched
            const windowWidth = Math.min(window.innerWidth, document.documentElement.clientWidth);

            // Calculate safe width: window width - total horizontal padding
            // Body (12*2=24) + Shell (12*2=24) + Card (8*2=16) = 64px minimum blockage
            // Add extra 24px safety margin = 88px total reduction from window width
            const totalPadding = windowWidth < 600 ? 88 : 120; 
            
            const maxAllowedWidth = Math.max(windowWidth - totalPadding, 200);

            // Allow larger size on desktop (up to 450), constrain on mobile
            // On mobile, we want it as large as possible without overflow
            const targetSize = windowWidth < 600 ? maxAllowedWidth : Math.min(maxAllowedWidth, 380);
            
            const cssSize = clamp(targetSize, 200, 450);
            
            state.canvasSize = cssSize;
            el.canvas.style.width = `${cssSize}px`;
            el.canvas.style.height = `${cssSize}px`;
            
            el.canvas.width = Math.floor(cssSize * dpr);
            el.canvas.height = Math.floor(cssSize * dpr);
            
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawRing(now) {
            const size = state.canvasSize;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.355;
            const lineWidth = Math.max(11, size * 0.044);

            ctx.clearRect(0, 0, size, size);

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = state.colors.ringBase || "rgba(112, 140, 190, 0.2)";
            ctx.lineWidth = lineWidth;
            ctx.stroke();

            if (!state.audioCtx) return;

            const activeTime = state.running ? state.audioCtx.currentTime : now / 1000;
            let pulse = 0;
            if (state.running) {
                const nearestBeatIndex = Math.round((activeTime - state.anchorTime) / state.beatLen);
                const nearestBeatTime = state.anchorTime + nearestBeatIndex * state.beatLen;
                const beatDist = Math.abs(activeTime - nearestBeatTime);
                pulse = clamp(1 - beatDist / 0.14, 0, 1);
            }

            const phaseAngle = state.running ? angleAtTime(activeTime) : state.beatAngle;
            const dotX = centerX + Math.cos(phaseAngle) * radius;
            const dotY = centerY + Math.sin(phaseAngle) * radius;

            if (state.showInitialPoint) {
                const beatX = centerX + Math.cos(state.beatAngle) * radius;
                const beatY = centerY + Math.sin(state.beatAngle) * radius;
                ctx.beginPath();
                ctx.arc(beatX, beatY, size * 0.022, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 140, 91, ${0.45 + 0.35 * pulse})`;
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(dotX, dotY, size * 0.026, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(53, 212, 255, 0.98)";
            ctx.shadowBlur = 12 + pulse * 16;
            ctx.shadowColor = "rgba(53, 212, 255, 0.85)";
            ctx.fill();
            ctx.shadowBlur = 0;

            for (let i = state.marks.length - 1; i >= 0; i -= 1) {
                const mark = state.marks[i];
                mark.opacity -= 0.014;
                if (mark.opacity <= 0) {
                    state.marks.splice(i, 1);
                    continue;
                }

                if (!state.showClickBar) continue;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(mark.angle);
                ctx.beginPath();
                ctx.moveTo(radius - 16, 0);
                ctx.lineTo(radius + 25, 0);
                ctx.strokeStyle = `rgba(255, 255, 255, ${mark.opacity})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        function animationLoop(now) {
            if (state.running && state.audioCtx) {
                const audioNow = state.audioCtx.currentTime;
                scheduleTicks(audioNow);
                const remaining = state.anchorTime - audioNow;
                if (remaining > 0) {
                    el.overlay.textContent = t("countdown", { sec: remaining.toFixed(1) });
                    el.overlay.classList.add("show");
                } else {
                    el.overlay.classList.remove("show");
                }
            } else {
                el.overlay.classList.remove("show");
            }

            drawRing(now);
            requestAnimationFrame(animationLoop);
        }

        function bindEvents() {
            el.startBtn.addEventListener("click", startTest);
            el.stopBtn.addEventListener("click", stopTest);

            el.canvas.addEventListener("pointerdown", (event) => {
                event.preventDefault();
                registerTap();
            });

            document.addEventListener("keydown", (event) => {
                const tag = event.target && event.target.tagName ? event.target.tagName : "";
                if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
                if (event.repeat) return;

                if (event.code === "Enter") {
                    event.preventDefault();
                    if (!state.running) startTest();
                    return;
                }

                if (event.code === "Escape") {
                    event.preventDefault();
                    if (state.running) stopTest();
                    toggleSettings(false);
                    return;
                }

                if (event.code === "Space") {
                    event.preventDefault();
                    registerTap();
                }
            });

            el.langEnBtn.addEventListener("click", () => setLanguage("en"));
            el.langZhBtn.addEventListener("click", () => setLanguage("zh-TW"));
            el.themeLightBtn.addEventListener("click", () => applyTheme("light"));
            el.themeDarkBtn.addEventListener("click", () => applyTheme("dark"));

            el.settingsBtn.addEventListener("click", (event) => {
                event.stopPropagation();
                toggleSettings();
            });

            el.settingsPanel.addEventListener("click", (event) => {
                event.stopPropagation();
            });

            document.addEventListener("click", () => {
                toggleSettings(false);
            });

            el.languageSelect.addEventListener("change", (event) => {
                setLanguage(event.target.value);
            });

            el.themeSelect.addEventListener("change", (event) => {
                applyTheme(event.target.value);
            });

            el.showInitialToggle.addEventListener("change", (event) => {
                state.showInitialPoint = event.target.checked;
                savePrefs();
            });

            el.showClickBarToggle.addEventListener("change", (event) => {
                state.showClickBar = event.target.checked;
                savePrefs();
            });

            window.addEventListener("resize", resizeCanvas);
        }

        function bootstrap() {
            loadPrefs();

            state.beatLen = 60 / state.bpm;
            state.beatAngle = Math.random() * Math.PI * 2;

            el.showInitialToggle.checked = state.showInitialPoint;
            el.showClickBarToggle.checked = state.showClickBar;
            el.languageSelect.value = state.language;

            applyTheme(state.theme);
            setLanguage(state.language);
            setStatus("idle");
            setHint("hintReady", "neutral");
            updateStats();
            syncButtons();
            resizeCanvas();
            bindEvents();
            requestAnimationFrame(animationLoop);
        }

        bootstrap();
    </script>
    </body>
</html>
